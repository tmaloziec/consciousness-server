name: cs-ecosystem

# Core ecosystem blocks. Ollama is external (host) via
# host.docker.internal. See ./README.md.
#
# Key-server is opted out of the default profile. A solo user
# running `docker compose up` brings up CS + SS + skills +
# test-runner + git-workflow + machines-server + redis — no auth
# infrastructure, AUTH_MODE defaults to `off`. To bring up
# key-server for observe/enforce modes:
#
#     docker compose --profile full up
#
# Redis is a hard dependency of consciousness-server (memory,
# agent bus, anti-replay). It runs in the default profile.
#
# Port palette: every host-side port is interpolated from
# deploy/.env (auto-generated by bin/sync-ports from ports.yaml).
# To retune the whole stack: edit ports.yaml, run bin/sync-ports,
# docker compose up. Container-internal ports (PORT env vars,
# inter-service URLs via docker DNS, REDIS_PORT against the redis
# container) stay hard-coded by design — they live inside the
# docker network and never collide with the host.

services:

  redis:
    image: redis:7-alpine
    container_name: cs-redis
    ports:
      - "${PORT_REDIS:-6379}:6379"
    volumes:
      - ./volumes/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  semantic-search:
    build:
      context: ../semantic-search
      dockerfile: Dockerfile
    container_name: cs-semantic-search
    # network_mode: host — PoC workaround, Ollama listens only on 127.0.0.1.
    # Container binds directly on the host port; no `ports:` mapping needed.
    # Same trick applies to key-server reachability: host networking
    # means we reach key-server through its host-mapped port, not
    # through the docker bridge DNS name.
    network_mode: host
    volumes:
      - ./volumes/chroma:/data/chroma
      - ./volumes/semantic-search-logs:/app/logs
    environment:
      OLLAMA_URL: http://localhost:11434
      EMBEDDING_MODEL: nomic-embed-text
      CHROMA_PATH: /data/chroma
      PORT: "${PORT_SEMANTIC_SEARCH:-3037}"
      AUTH_MODE: ${AUTH_MODE:-off}
      KEY_SERVER_URL: http://127.0.0.1:${PORT_KEY_SERVER:-3040}
      AUTH_OBSERVE_LOG: /app/logs/auth-observe.log
    restart: unless-stopped

  consciousness-server:
    build:
      context: ../core
      dockerfile: Dockerfile
    container_name: cs-server
    ports:
      - "${PORT_CONSCIOUSNESS_SERVER:-3032}:3032"
    volumes:
      - ../agents:/data/agents:ro
      - ../skills:/data/skills:ro
      - ./volumes/cs-logs:/app/logs
    environment:
      PORT: "3032"
      CONSCIOUSNESS_HOST: 0.0.0.0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AGENTS_DIR: /data/agents
      SKILLS_DIR: /data/skills
      OLLAMA_URL: http://host.docker.internal:11434
      SEMANTIC_SEARCH_URL: http://host.docker.internal:${PORT_SEMANTIC_SEARCH:-3037}
      HOME: /tmp
      AUTH_MODE: ${AUTH_MODE:-off}
      KEY_SERVER_URL: http://key-server:3040
      AUTH_OBSERVE_LOG: /app/logs/auth-observe.log
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    # SS is on host network, depends_on conditions don't apply the same way —
    # CS retries SS via SEMANTIC_SEARCH_URL until it responds.
    restart: unless-stopped

  key-server:
    # Only started under `--profile full` — solo users running the
    # default profile get the ecosystem with AUTH_MODE=off and do not
    # need key-server at all.
    profiles: ["full"]
    build:
      context: ../key-server
      dockerfile: Dockerfile
    container_name: cs-key-server
    ports:
      - "${PORT_KEY_SERVER:-3040}:3040"
    volumes:
      - ../key-server/keys:/app/keys:ro
      - ../key-server/auth:/app/auth:ro
      - ./volumes/key-server-logs:/app/logs
    environment:
      KEY_SERVER_PORT: "3040"
      KEY_SERVER_HOST: 0.0.0.0
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  machines-server:
    build:
      context: ../machines-server
      dockerfile: Dockerfile
    container_name: cs-machines-server
    ports:
      - "${PORT_MACHINES_SERVER:-3038}:3038"
    volumes:
      - ../machines:/data/machines:ro
      - ../services.yaml:/data/services.yaml:ro
      - ./volumes/machines-logs:/app/logs
    environment:
      PORT: "3038"
      CS_URL: http://consciousness-server:3032
      MACHINES_DIR: /data/machines
      SERVICES_YAML: /data/services.yaml
      AUTH_MODE: ${AUTH_MODE:-off}
      KEY_SERVER_URL: http://key-server:3040
      AUTH_OBSERVE_LOG: /app/logs/auth-observe.log
    restart: unless-stopped

  git-workflow:
    build:
      context: ../git-workflow
      dockerfile: Dockerfile
    container_name: cs-git-workflow
    ports:
      - "${PORT_GIT_WORKFLOW:-3042}:3042"
    volumes:
      - ./volumes/git-workflow:/data
      - ./volumes/git-workflow-logs:/app/logs
    environment:
      PORT: "3042"
      DB_PATH: /data/commits.db
      AUTH_MODE: ${AUTH_MODE:-off}
      KEY_SERVER_URL: http://key-server:3040
      AUTH_OBSERVE_LOG: /app/logs/auth-observe.log
    restart: unless-stopped

  test-runner:
    build:
      context: ../test-runner
      dockerfile: Dockerfile
    container_name: cs-test-runner
    ports:
      - "${PORT_TEST_RUNNER:-3041}:3041"
    volumes:
      - ./volumes/test-runner-workspaces:/workspaces
      - ./volumes/test-runner-logs:/app/logs
    environment:
      PORT: "3041"
      AUTH_MODE: ${AUTH_MODE:-off}
      KEY_SERVER_URL: http://key-server:3040
      AUTH_OBSERVE_LOG: /app/logs/auth-observe.log
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────
  # memory-server + its Postgres (opt-in via --profile mesh).
  #
  # Stage 1 of the BuildOnAI Mesh roadmap: ingest every document with chunk
  # offsets and embeddings into a substrate that future graph + density
  # work builds on without re-processing the corpus. Not on by default
  # because the existing "off" profile is meant to stay zero-config — pull
  # this in with:   docker compose --profile mesh up
  # ────────────────────────────────────────────────────────────────────────
  memory-postgres:
    image: pgvector/pgvector:pg16
    container_name: cs-memory-postgres
    profiles: ["mesh", "full"]
    ports:
      - "${MEMORY_PG_HOST_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ${MEMORY_PG_DB:-memory}
      POSTGRES_USER: ${MEMORY_PG_USER:-memory}
      POSTGRES_PASSWORD: ${MEMORY_PG_PASSWORD:-memory}
    volumes:
      - ./volumes/memory-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEMORY_PG_USER:-memory} -d ${MEMORY_PG_DB:-memory}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  memory-server:
    build:
      context: ../memory-server
      dockerfile: Dockerfile
    container_name: cs-memory-server
    profiles: ["mesh", "full"]
    depends_on:
      memory-postgres:
        condition: service_healthy
    # Host networking — same trick semantic-search uses for the same reason.
    # Ollama binds to 127.0.0.1 by default and a containerised client on
    # docker0 cannot reach it. Sharing the host's network stack lets
    # memory-server hit Ollama on localhost AND reach Postgres on the
    # host-mapped 127.0.0.1:${MEMORY_PG_HOST_PORT} port.
    network_mode: host
    environment:
      MEMORY_SERVER_HOST: 0.0.0.0
      # Port falls through env → ports.yaml in container → fallback 3045.
      # Override per-deployment via PORT_MEMORY_SERVER=<n> in deploy/.env (or
      # the surrounding shell). Keep the value in sync with ports.yaml on
      # the host so CLI tools like bin/ingest-document, which read ports.yaml,
      # find the same port.
      PORT: "${PORT_MEMORY_SERVER:-3045}"
      MEMORY_PG_HOST: 127.0.0.1
      MEMORY_PG_PORT: "${MEMORY_PG_HOST_PORT:-15432}"
      MEMORY_PG_DB: ${MEMORY_PG_DB:-memory}
      MEMORY_PG_USER: ${MEMORY_PG_USER:-memory}
      MEMORY_PG_PASSWORD: ${MEMORY_PG_PASSWORD:-memory}
      OLLAMA_URL: http://localhost:11434
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      AUTH_MODE: ${AUTH_MODE:-off}
      KEY_SERVER_URL: http://localhost:${PORT_KEY_SERVER:-3040}
    restart: unless-stopped
